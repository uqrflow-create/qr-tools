<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Color Contrast Checker</title>
<style>
body{
font-family:Arial,sans-serif;
max-width:700px;
margin:40px auto;
padding:20px;
}
input{
width:100%;
height:50px;
margin:10px 0;
}
button{
padding:12px 20px;
cursor:pointer;
}
#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
footer{
margin-top:50px;
}
</style>
</head>
<body>

<h1>QR Code Color Contrast Checker</h1>

<p>Select QR foreground and background colors.</p>

<label>Foreground Color</label> <input type="color" id="fg" value="#000000">

<label>Background Color</label> <input type="color" id="bg" value="#ffffff">

<button onclick="checkContrast()">Check Contrast</button>

<div id="result"></div>

<footer>
Powered by <a href="https://useqrflow.com" target="_blank">QR Flow</a>
</footer>

<script>
function luminance(hex){
const rgb=hex.match(/\w\w/g).map(x=>parseInt(x,16)/255);
return 0.2126*rgb[0]+0.7152*rgb[1]+0.0722*rgb[2];
}

function checkContrast(){
const fg=document.getElementById('fg').value;
const bg=document.getElementById('bg').value;

const l1=luminance(fg);
const l2=luminance(bg);

const ratio=(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);

document.getElementById('result').innerHTML=
'Contrast Ratio: '+ratio.toFixed(2);
}
</script>

</body>
</html>
